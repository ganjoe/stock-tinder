<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCP Tinder - TradingView</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
        }

        .btn-sm {
            margin: 2px;
        }

        .table-dark {
            font-size: 0.8rem;
        }

        .table-dark th,
        .table-dark td {
            text-align: center;
            vertical-align: middle;
            padding: 4px;
        }

        .cursor-pointer {
            cursor: pointer;
        }

        .score-input {
            width: 50px;
            text-align: center;
        }

        #chart-wrapper {
            transition: height 0.3s ease-out;
        }

        #annotations-table-row {
            transition: opacity 0.3s ease-out;
        }

        /* Pane styling */
        .chart-pane-container {
            position: relative;
            min-height: 50px;
        }

        .pane-close-btn {
            position: absolute;
            top: 2px;
            right: 40px;
            z-index: 20;
            background: rgba(80, 80, 80, 0.7);
            border: none;
            color: #ccc;
            font-size: 12px;
            padding: 1px 6px;
            cursor: pointer;
            border-radius: 3px;
            line-height: 1.2;
        }

        .pane-close-btn:hover {
            background: rgba(200, 60, 60, 0.8);
            color: #fff;
        }

        .pane-label {
            position: absolute;
            top: 2px;
            left: 6px;
            z-index: 20;
            color: rgba(200, 200, 200, 0.5);
            font-size: 10px;
            pointer-events: none;
        }

        .chart-resizer {
            height: 5px;
            background: #444;
            cursor: row-resize;
            z-index: 10;
            flex-shrink: 0;
        }

        /* Dropdown menus with checkboxes */
        .dropdown-menu-dark-custom {
            background-color: #2a2a2a;
            border: 1px solid #555;
            max-height: 300px;
            overflow-y: auto;
            min-width: 160px;
        }

        .dropdown-menu-dark-custom .form-check {
            padding: 3px 12px 3px 32px;
        }

        .dropdown-menu-dark-custom .form-check-label {
            color: #ddd;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .dropdown-menu-dark-custom .form-check-input {
            cursor: pointer;
        }

        .dropdown-menu-dark-custom .dropdown-header {
            color: #888;
            font-size: 0.7rem;
            padding: 4px 12px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="container-fluid mt-2">
        <!-- Chart -->
        <div class="row mt-2">
            <div class="col-12">
                <div id="chart-wrapper" style="display: flex; flex-direction: column; height: 60vh;">
                    <!-- Price pane (always first, flex-grows) -->
                    <div id="price-chart-container" class="chart-pane-container"
                        style="flex: 1 1 auto; min-height: 150px;" data-category="price">
                        <span class="pane-label">Price</span>
                    </div>
                    <!-- Dynamic panes will be inserted here by JS -->
                    <!-- Volume pane (always last) -->
                    <div id="vol-resizer" class="chart-resizer"></div>
                    <div id="volume-chart-container" class="chart-pane-container"
                        style="height: 150px; flex: 0 0 auto; min-height: 50px;" data-category="vol">
                        <span class="pane-label">Volume</span>
                        <button class="pane-close-btn" data-close-category="vol" title="Close Volume pane">✕</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="row mt-3">
            <div class="col-12 d-flex flex-wrap align-items-center gap-2">
                <!-- Main Navigation & Scores -->
                <div class="btn-group me-2" role="group">
                    <button type="button" class="btn btn-secondary btn-sm" id="btn-prev">◄ Prev</button>
                    <button type="button" class="btn btn-primary btn-sm" id="btn-next">Next ►</button>

                    <button type="button" class="btn btn-success btn-sm ms-2 btn-score" data-score="1">1</button>
                    <button type="button" class="btn btn-success btn-sm btn-score" data-score="2">2</button>
                    <button type="button" class="btn btn-success btn-sm btn-score" data-score="3">3</button>
                    <button type="button" class="btn btn-success btn-sm btn-score" data-score="4">4</button>
                    <button type="button" class="btn btn-success btn-sm btn-score" data-score="5">5</button>
                    <button type="button" class="btn btn-success btn-sm btn-score" data-score="6">6</button>

                    <button type="button" class="btn btn-outline-info btn-sm ms-2 btn-tf" data-days="30">30D</button>
                    <button type="button" class="btn btn-outline-info btn-sm btn-tf" data-days="60">60D</button>
                    <button type="button" class="btn btn-outline-info btn-sm btn-tf" data-days="90">90D</button>
                </div>

                <!-- Dropdowns and Search -->
                <select id="watchlist-select" class="form-select form-select-sm"
                    style="width: 22ch; font-size: inherit; background-color: #333; color: white; border-color: #555;"
                    title="Select Watchlist">
                </select>
                <select id="ticker-select" class="form-select form-select-sm"
                    style="width: 10ch; font-size: inherit; background-color: #333; color: white; border-color: #555;"
                    title="Select Ticker">
                </select>
                <input type="text" id="ticker-search" list="ticker-datalist" class="form-control form-control-sm ms-2"
                    placeholder="🔍"
                    style="width: 7ch; font-size: inherit; background-color: #333; color: white; border-color: #555;"
                    title="Search local tickers">
                <datalist id="ticker-datalist"></datalist>

                <!-- Pane Dropdown -->
                <div class="dropdown ms-2">
                    <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                        id="pane-dropdown-btn" data-bs-toggle="dropdown" data-bs-auto-close="outside"
                        aria-expanded="false">
                        📊 Panes
                    </button>
                    <div class="dropdown-menu dropdown-menu-dark-custom" id="pane-dropdown-menu"
                        aria-labelledby="pane-dropdown-btn">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Indicator Dropdown -->
                <div class="dropdown">
                    <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                        id="indicator-dropdown-btn" data-bs-toggle="dropdown" data-bs-auto-close="outside"
                        aria-expanded="false">
                        📈 Indicators
                    </button>
                    <div class="dropdown-menu dropdown-menu-dark-custom" id="indicator-dropdown-menu"
                        aria-labelledby="indicator-dropdown-btn">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Toggles -->
                <div class="form-check form-switch ms-2">
                    <input class="form-check-input" type="checkbox" role="switch" id="table-toggle" checked>
                    <label class="form-check-label" for="table-toggle">📊 Table</label>
                </div>
                <div class="form-check form-switch ms-2">
                    <input class="form-check-input" type="checkbox" role="switch" id="autoscale-toggle" checked>
                    <label class="form-check-label" for="autoscale-toggle">📐 Auto</label>
                </div>
                <div class="form-check form-switch ms-2 me-2">
                    <input class="form-check-input" type="checkbox" role="switch" id="select-mode-toggle">
                    <label class="form-check-label" for="select-mode-toggle" class="text-warning">👆 Select</label>
                </div>

                <!-- Radios -->
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="radio" name="viewToggle" id="viewHuman" value="human" checked>
                    <label class="form-check-label" for="viewHuman">Human</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="radio" name="viewToggle" id="viewBot" value="bot">
                    <label class="form-check-label" for="viewBot">Bot</label>
                </div>
            </div>

            <!-- Table -->
            <div class="row mt-3" id="annotations-table-row">
                <div class="col-12">
                    <div style="max-height: 25vh; overflow-y: auto; border: 1px solid #333;">
                        <table class="table table-dark table-hover mb-0" id="annotations-table">
                            <thead style="position: sticky; top: 0; z-index: 1;">
                                <tr>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Pattern</th>
                                    <th>Score (1-6)</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Rows dynamically generated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- TradingView Lightweight Charts (Standalone CSS/JS via CDN) -->
        <script
            src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
        <!-- Bootstrap JS for dropdown functionality -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <!-- App Logic -->
        <script src="app.js?v=8"></script>

</body>

</html>
